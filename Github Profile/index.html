<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitFinder 3D — GitHub Profile Explorer</title>
  <meta name="description"
    content="Explore any GitHub profile with a stunning 3D animated interface. Search developers, view repos, stats, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <canvas id="bg-canvas"></canvas>
  <div class="scanline"></div>

  <div id="app">
    <!-- Header -->
    <header>
      <a class="logo" href="#" aria-label="GitFinder 3D Home">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.031 1.531 1.031.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.026A9.564 9.564 0 0112 6.845c.85.004 1.705.115 2.504.337 1.909-1.295 2.747-1.026 2.747-1.026.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.748 0 .268.18.58.688.482A10.019 10.019 0 0022 12C22 6.477 17.523 2 12 2z" />
          </svg>
        </div>
        <span class="logo-text">Git<span>Finder</span> 3D</span>
      </a>
      <div class="header-actions">
        <button class="icon-btn" id="theme-btn" aria-label="Toggle theme" title="Toggle theme">🌙</button>
        <button class="icon-btn" id="share-btn" aria-label="Share this profile" title="Share profile">🔗</button>
      </div>
    </header>

    <!-- Hero -->
    <section class="hero" aria-labelledby="hero-heading">
      <h1 id="hero-heading">Explore GitHub<br />in 3D Space</h1>
      <p class="hero-sub" id="typing-sub"><span id="typing-text"></span><span class="cursor" aria-hidden="true"></span>
      </p>

      <!-- Search -->
      <div class="search-wrapper">
        <div class="search-bar" role="search">
          <span class="search-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
          </span>
          <input type="text" id="search-input" placeholder="Enter GitHub username..." autocomplete="off"
            spellcheck="false" aria-label="GitHub username" />
          <button id="search-btn" aria-label="Search GitHub profile">Search →</button>
        </div>
      </div>

      <!-- Recent searches -->
      <div id="recents-wrap">
        <p class="recents-label" id="recents-label" style="display:none">RECENT SEARCHES</p>
        <div class="recents-chips" id="recents-chips" aria-label="Recent searches"></div>
      </div>
    </section>

    <!-- Globe canvas -->
    <div id="globe-section" aria-hidden="true">
      <canvas id="globe-canvas" width="240" height="240"></canvas>
    </div>

    <!-- Loader -->
    <div id="loader" role="status" aria-live="polite" aria-label="Loading profile">
      <div class="ring-loader" aria-hidden="true"></div>
      <p class="loader-text" id="loader-text">Fetching profile data...</p>
    </div>

    <!-- Error -->
    <div id="error-state" role="alert" aria-live="assertive">
      <p class="error-title" id="error-title">USER_NOT_FOUND</p>
      <p class="error-msg" id="error-msg">No developer found in this dimension.</p>
    </div>

    <!-- Profile -->
    <section id="profile-section" aria-live="polite">
      <!-- Profile Card -->
      <div class="profile-card" id="profile-card" role="region" aria-label="GitHub profile">
        <div class="profile-top">
          <div class="avatar-wrap">
            <div class="avatar-ring">
              <img id="avatar" src="" alt="User avatar" loading="lazy" />
            </div>
            <div class="online-badge" title="Profile found"></div>
          </div>
          <div class="profile-info">
            <h2 class="profile-name" id="profile-name"></h2>
            <p class="profile-login" id="profile-login"></p>
            <p class="profile-bio" id="profile-bio"></p>
            <div class="profile-meta" id="profile-meta"></div>
            <div class="profile-actions" id="profile-actions"></div>
          </div>
        </div>

        <div class="stats-grid" id="stats-grid"></div>
      </div>

      <!-- Repos -->
      <div id="repos-section">
        <p class="section-title">📁 Top Repositories</p>
        <div class="repos-grid" id="repos-grid"></div>
      </div>
    </section>
  </div>

  <!-- Toast notification -->
  <div id="toast" role="alert" aria-live="polite"></div>

  <!-- Three.js CDN (must load before app.js) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js"></script>
  <!-- App logic -->
  <script src="app.js"></script>
</body>

</html>
